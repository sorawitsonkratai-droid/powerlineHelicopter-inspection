<title>ระบบตรวจสายส่งไฟฟ้า</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Sarabun',sans-serif;background:#fff;color:#1a2d6e;font-size:15px;}
button{font-family:inherit;cursor:pointer;}
textarea,input{font-family:inherit;}
.screen{display:none;padding:20px 16px 80px;}
.screen.active{display:block;}
/* iPhone safe area - black-translucent mode */
:root{
  --sat: env(safe-area-inset-top, 44px);
  --sab: env(safe-area-inset-bottom, 34px);
}
.screen.active{padding-top:calc(20px + var(--sat))!important;}
.header-bar{
  padding-top:calc(10px + var(--sat))!important;
  padding-bottom:10px!important;
}
.bottom-bar{padding-bottom:calc(10px + var(--sab))!important;}
.card{background:#fff;border:1px solid #e0e4ef;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 6px rgba(26,45,110,0.05);}
.card.has-issue{border-color:#E24B4A88;background:#fff8f8;}
.card.checked{border-color:#1D9E75;background:#f0faf6;}
.header-bar{background:#fed500;padding:12px 14px;position:sticky;top:0;z-index:100;width:100vw;box-sizing:border-box;margin-left:calc(-1 * var(--screen-pad, 0px));box-shadow:0 2px 8px rgba(26,45,110,0.12);}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 14px;display:flex;gap:8px;align-items:center;}
.btn{border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-green{background:#1D9E75;color:#fff;}
.btn-red{background:transparent;border:1.5px solid #E24B4A!important;color:#E24B4A;}
.btn-yellow{background:#fff5cc;border:1px solid #d4a700;color:#7a5800;font-size:12px;padding:5px 10px;}
.btn-back{background:#f0f0f0;border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;color:#555;}
.chip{display:inline-block;padding:9px 16px;border-radius:10px;font-size:14px;border:2px solid #bbb;background:#fff;color:#333;margin:3px;cursor:pointer;font-weight:400;}
.chip.active-orange{background:#EF9F27;border-color:#EF9F27;color:#fff;font-weight:700;box-shadow:0 2px 8px #EF9F2755;}
.chip.active-blue{background:#378ADD;border-color:#378ADD;color:#fff;font-weight:700;box-shadow:0 2px 8px #378ADD55;}
.section-pole{background:#FFF8EC;border:1.5px solid #EF9F2744;border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.section-span{background:#EDF4FF;border:1.5px solid #378ADD44;border-radius:12px;padding:10px 12px;}
.section-title{font-size:12px;font-weight:700;margin-bottom:8px;}
.section-title.orange{color:#a06000;}
.section-title.blue{color:#1a5090;}
textarea{width:100%;border-radius:10px;padding:8px 10px;font-size:13px;border:1.5px solid #ddd;background:#fafafa;resize:none;margin-top:6px;display:block;}
.tag-checked{font-size:12px;color:#fff;font-weight:600;background:#1D9E75;padding:2px 10px;border-radius:20px;}
.tag-issue{font-size:12px;color:#E24B4A;font-weight:600;background:#E24B4A18;padding:2px 8px;border-radius:20px;}
.tag-normal{font-size:12px;color:#999;}
.zone-btn{width:100%;background:#f2f3f5;border:none;border-radius:16px;padding:0;margin-bottom:14px;text-align:left;display:flex;align-items:center;overflow:hidden;}
.zone-icon{font-size:28px;}
.zone-img{width:160px;height:110px;object-fit:contain;object-position:center left;flex-shrink:0;mix-blend-mode:multiply;padding:4px 0 4px 8px;}
.zone-text{padding:16px 20px;flex:1;}
.zone-name{font-size:18px;font-weight:900;color:#1a2d6e;margin-bottom:5px;}
.zone-sub{font-size:13px;color:#888;font-weight:400;}
.line-btn{width:100%;background:#fff;border:1px solid #e0e4ef;border-radius:12px;padding:12px 14px;margin-bottom:8px;text-align:left;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(26,45,110,0.06);}
.line-btn.has-issue{border-color:#E24B4A55;background:#fff8f8;}
.hero{background:#fed500;border-radius:18px;padding:16px 20px;margin-bottom:24px;margin-left:0;margin-right:0;}
.hero-inner{padding:0;}
.egat-header{display:flex;align-items:center;gap:14px;}
.egat-logo{height:48px;object-fit:contain;}
.egat-divider{width:2px;height:40px;background:#1a2d6e;border-radius:2px;}
.egat-title{font-size:18px;font-weight:400;color:#1a2d6e;letter-spacing:1.5px;text-transform:uppercase;line-height:1.2;}
</style>
</head>

const SK = "insp_v4";
let state = {sessions:{}, zone:null};
let currentZone = null;

let prevScreen = "zone";

function loadState(){
  try{ const s=localStorage.getItem(SK); if(s) state=JSON.parse(s); }catch(e){}
}
function saveState(){
  try{ localStorage.setItem(SK, JSON.stringify(state)); }catch(e){}
}
function clearAll(){
  if(!confirm("ล้างข้อมูลการตรวจทั้งหมด?\n\nข้อมูลที่บันทึกไว้จะหายทั้งหมด ไม่สามารถกู้คืนได้")) return;
  state={sessions:{},zone:null};
  try{localStorage.removeItem(SK);}catch(e){}
  checked={};
  showZone();
}

function showScreen(id, pushHistory=true){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  window.scrollTo(0,0);
  if(pushHistory){
    history.pushState({screen:id}, "", "");
  }
}

// Handle Android back button
window.addEventListener("popstate", function(e){
  const active = document.querySelector(".screen.active")?.id?.replace("screen-","");
  if(active === "inspect"){
    showLinesInternal();
    // re-push lines state so next back goes to zone
    history.pushState({screen:"lines"}, "", "");
  } else if(active === "lines"){
    showZoneInternal();
    // re-push zone state so next back exits app
    history.pushState({screen:"zone"}, "", "");
  } else if(active === "summary"){
    showScreenInternal(prevScreen);
    history.pushState({screen:prevScreen}, "", "");
  }
  // zone: do nothing, browser handles exit naturally
});

// Internal versions that don't push history (called from popstate)
function showScreenInternal(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  window.scrollTo(0,0);
}

function showLinesInternal(){
  const total=totalIssues();
  document.getElementById("lines-title").textContent=currentZone==="bkk"?"กรุงเทพฯ และปริมณฑล":"ภาคตะวันตก";
  document.getElementById("btn-summary-lines").style.display=total>0?"":"none";
  const list=document.getElementById("lines-list");
  list.innerHTML="";
  const groups=GROUPS[currentZone];
  groups.forEach((group,gIdx)=>{
    if(gIdx>0){
      const div=document.createElement("div");
      div.style.cssText="height:1px;background:#d0d5e8;margin:6px 0 10px;";
      list.appendChild(div);
    }
    group.forEach(i=>{
      const l=DB[currentZone][i];
      if(!l) return;
      const key=`${currentZone}_${i}`;
      const sess=state.sessions[key];
      const cnt=sess?Object.values(sess.towers||{}).filter(d=>d&&((d.pole||[]).length||(d.span||[]).length||d.poleOther||d.spanOther)).length:0;
      const btn=document.createElement("button");
      btn.className="line-btn"+(cnt>0?" has-issue":"");
      btn.innerHTML=`<div><div style="font-weight:600;font-size:13px;">${l.name}</div><div style="font-size:11px;color:#666;margin-top:2px;">TMU: ${l.tmu||"-"} · ${l.towers.length} ต้น</div></div>`+
        (cnt>0?`<div style="font-size:12px;color:#E24B4A;font-weight:600;">⚠ ${cnt}</div>`:sess?`<div style="font-size:11px;color:#1D9E75;">✓ บันทึกแล้ว</div>`:"");
      btn.onclick=()=>openInspect(i);
      list.appendChild(btn);
    });
  });
  prevScreen="lines";
  showScreenInternal("lines");
}

function showZoneInternal(){
  loadState();
  const total=totalIssues();
  const saved=Object.keys(state.sessions).length;
  const sumEl=document.getElementById("zone-summary");
  if(saved>0){sumEl.textContent=`บันทึกไว้ ${saved} สายส่ง · ${total} เสาที่มีปัญหา`;sumEl.style.display="";}
  else sumEl.style.display="none";
  ["bkk","west"].forEach(z=>{
    const cnt=Object.entries(state.sessions).filter(([k])=>k.startsWith(z)).length;
    document.getElementById(z+"-count").textContent=`จำนวน ${DB[z].length} Route สายส่ง`+(cnt>0?` · ตรวจแล้ว ${cnt} สาย`:"");
  });
  document.getElementById("btn-summary-zone").style.display=total>0?"":"none";
  document.getElementById("btn-clear").style.display=saved>0?"":"none";
  showScreenInternal("zone");
}

function totalIssues(){
  return Object.values(state.sessions).reduce((sum,s)=>
    sum+Object.values(s.towers||{}).filter(d=>d&&((d.pole||[]).length||(d.span||[]).length||d.poleOther||d.spanOther)).length,0);
}

function showZone(){
  loadState();
  const total=totalIssues();
  const saved=Object.keys(state.sessions).length;
  const sumEl=document.getElementById("zone-summary");
  if(saved>0){sumEl.textContent=`บันทึกไว้ ${saved} สายส่ง · ${total} เสาที่มีปัญหา`;sumEl.style.display="";}
  else sumEl.style.display="none";
  ["bkk","west"].forEach(z=>{
    const cnt=Object.entries(state.sessions).filter(([k])=>k.startsWith(z)).length;
    document.getElementById(z+"-count").textContent=`จำนวน ${DB[z].length} Route สายส่ง`+(cnt>0?` · ตรวจแล้ว ${cnt} สาย`:"");
  });
  document.getElementById("btn-summary-zone").style.display=total>0?"":"none";
  document.getElementById("btn-clear").style.display=saved>0?"":"none";
  showScreen("zone");
}

function selectZone(z){
  currentZone=z;
  showLines();
}

function showLines(){
  const total=totalIssues();
  document.getElementById("lines-title").textContent=currentZone==="bkk"?"กรุงเทพฯ และปริมณฑล":"ภาคตะวันตก";
  document.getElementById("btn-summary-lines").style.display=total>0?"":"none";
  const list=document.getElementById("lines-list");
  list.innerHTML="";
  const groups=GROUPS[currentZone];
  groups.forEach((group,gIdx)=>{
    // divider between groups
    if(gIdx>0){
      const div=document.createElement("div");
      div.style.cssText="height:1px;background:#d0d5e8;margin:6px 0 10px;";
      list.appendChild(div);
    }
    group.forEach(i=>{
      const l=DB[currentZone][i];
      if(!l) return;
      const key=`${currentZone}_${i}`;
      const sess=state.sessions[key];
      const cnt=sess?Object.values(sess.towers||{}).filter(d=>d&&((d.pole||[]).length||(d.span||[]).length||d.poleOther||d.spanOther)).length:0;
      const btn=document.createElement("button");
      btn.className="line-btn"+(cnt>0?" has-issue":"");
      btn.innerHTML=`<div><div style="font-weight:600;font-size:13px;">${l.name}</div><div style="font-size:11px;color:#666;margin-top:2px;">TMU: ${l.tmu||"-"} · ${l.towers.length} ต้น</div></div>`+
        (cnt>0?`<div style="font-size:12px;color:#E24B4A;font-weight:600;">⚠ ${cnt}</div>`:sess?`<div style="font-size:11px;color:#1D9E75;">✓ บันทึกแล้ว</div>`:"");
      btn.onclick=()=>openInspect(i);
      list.appendChild(btn);
    });
  });
  prevScreen="lines";
  showScreen("lines");
}

function openInspect(idx){
  currentLineIdx=idx;
  checked={};
  const key=`${currentZone}_${currentLineIdx}`;
  const line=DB[currentZone][idx];
  document.getElementById("inspect-title").textContent=line.name;
  renderTowers();
  showScreen("inspect");
}

function getTK(tower,tIdx){return tIdx+":"+tower;}

function getTowerData(tower,tIdx){
  const key=`${currentZone}_${currentLineIdx}`;
  return (state.sessions[key]?.towers||{})[getTK(tower,tIdx)]||{pole:[],span:[],poleOther:"",spanOther:"",poleNote:"",spanNote:""};
}

function setTowerData(tower,tIdx,data){
  const key=`${currentZone}_${currentLineIdx}`;
  const line=DB[currentZone][currentLineIdx];
  if(!state.sessions[key]) state.sessions[key]={line,towers:{}};
  state.sessions[key].line=line;
  state.sessions[key].towers[getTK(tower,tIdx)]=data;
  saveState();
  updateBottomBar();
}

function updateBottomBar(){
  const key=`${currentZone}_${currentLineIdx}`;
  const line=DB[currentZone][currentLineIdx];
  const cnt=Object.values(state.sessions[key]?.towers||{}).filter(d=>d&&((d.pole||[]).length||(d.span||[]).length||d.poleOther||d.spanOther)).length;
  const chkCnt=Object.keys(checked).length;
  document.getElementById("issue-count").textContent=`${cnt} ต้นที่มีปัญหา`+(chkCnt>0?` · ✓ ${chkCnt} ต้น`:"");
  document.getElementById("inspect-subtitle").textContent=`${line.towers.length} ต้น · TMU: ${line.tmu||"-"}`+(chkCnt>0?` · ✓ ${chkCnt} ต้น`:"");
}

function toggleCheck(tower,tIdx){
  const ck=getTK(tower,tIdx);
  if(checked[ck]) delete checked[ck];
  else checked[ck]=true;
  renderTowerCard(tower,tIdx);
  updateBottomBar();
}

function toggleIssue(tower,tIdx,type,val){
  const d={...getTowerData(tower,tIdx)};
  const arr=d[type]||[];
  d[type]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val];
  setTowerData(tower,tIdx,d);
  renderTowerCard(tower,tIdx);
}

function setField(tower,tIdx,field,val){
  const d={...getTowerData(tower,tIdx)};
  d[field]=val;
  setTowerData(tower,tIdx,d);
}

function renderTowerCard(tower,tIdx){
  const route=DB[currentZone][currentLineIdx];
  const nextTower=route.towers[tIdx+1]||null;
  const d=getTowerData(tower,tIdx);
  const ck=getTK(tower,tIdx);
  const isChecked=!!checked[ck];
  const hasIssue=(d.pole||[]).length||(d.span||[]).length||d.poleOther||d.spanOther;
  const spanLabel=nextTower?`🔻 ปัญหาระหว่าง Span T.${tower} - ${nextTower}`:`🔻 ปัญหาระหว่าง Span T.${tower}`;

  // Get line name using lc (line changes array, index-based)
  let lineName="";
  if(route.lc && route.lc.length>0){
    let cur="";
    for(let i=0;i<route.lc.length;i++){
      if(route.lc[i][0]<=tIdx) cur=route.lc[i][1];
      else break;
    }
    lineName=cur;
  }
  const el=document.getElementById("card-"+tIdx);
  if(!el) return;

  el.className="card"+(isChecked?" checked":hasIssue?" has-issue":"");

  const poleChips=["โคนเสารก","เถาวัลย์","อื่นๆ"].map(v=>`<span class="chip${(d.pole||[]).includes(v)?" active-orange":""}" onclick="toggleIssue('${tower}',${tIdx},'pole','${v}')">${v}</span>`).join("");
  const spanChips=["ต้นไม้","สปส.","ขุดดิน/ถมดิน","อื่นๆ"].map(v=>`<span class="chip${(d.span||[]).includes(v)?" active-blue":""}" onclick="toggleIssue('${tower}',${tIdx},'span','${v}')">${v}</span>`).join("");
  const showPoleOther=(d.pole||[]).includes("อื่นๆ");
  const showPoleNote=(d.pole||[]).length>0||d.poleOther;
  const hasSpanIssue=(d.span||[]).length>0||d.spanOther;
  const showSpanOther=(d.span||[]).includes("อื่นๆ");

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid ${isChecked?"#1D9E7544":hasIssue?"#E24B4A22":"#eee"};">
      <button onclick="toggleCheck('${tower}',${tIdx})" style="background:${isChecked?"#1D9E75":"#fff"};color:${isChecked?"#fff":"#333"};border:2px solid ${isChecked?"#1D9E75":"#bbb"};border-radius:8px;padding:6px 14px;font-weight:700;font-size:15px;box-shadow:${isChecked?"0 2px 8px #1D9E7566":"0 1px 3px #0002"};transition:all 0.15s;">${tower}</button>
      <div style="flex:1;min-width:0;">
        ${isChecked?'<span class="tag-checked">✓ ตรวจแล้ว</span>':hasIssue?'<span class="tag-issue">⚠ มีปัญหา</span>':'<span class="tag-normal">ยังไม่ตรวจ</span>'}
        ${lineName?`<div style="font-size:11px;color:#c0392b;font-weight:600;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${lineName}</div>`:""}
        ${(()=>{
          let tmuVal=route.tmu||"";
          if(route.tc && route.tc.length>0){
            let cur="";
            for(let i=0;i<route.tc.length;i++){if(route.tc[i][0]<=tIdx)cur=route.tc[i][1];else break;}
            if(cur) tmuVal=cur;
          }
          return tmuVal?`<div style="font-size:10px;color:#888;margin-top:2px;">TMU: ${tmuVal}</div>`:"";
        })()}
      </div>
    </div>
    <div class="section-pole">
      <div class="section-title orange">🔺 ปัญหาที่เสา</div>
      <div>${poleChips}</div>
      ${showPoleOther?`<textarea rows="2" placeholder="ระบุปัญหาที่เสา..." onchange="setField('${tower}',${tIdx},'poleOther',this.value)">${d.poleOther||""}</textarea>`:""}
      ${showPoleNote?`<textarea rows="2" placeholder="หมายเหตุ..." onchange="setField('${tower}',${tIdx},'poleNote',this.value)">${d.poleNote||""}</textarea>`:""}
    </div>
    <div class="section-span">
      <div class="section-title blue">${spanLabel}</div>
      <div>${spanChips}</div>
      ${showSpanOther?`<textarea rows="2" placeholder="ระบุปัญหาระหว่างเสา..." onchange="setField('${tower}',${tIdx},'spanOther',this.value)">${d.spanOther||""}</textarea>`:""}
      ${hasSpanIssue?`<textarea rows="2" placeholder="หมายเหตุ..." onchange="setField('${tower}',${tIdx},'spanNote',this.value)">${d.spanNote||""}</textarea>`:""}
    </div>
  `;
}

function renderTowers(){
  const line=DB[currentZone][currentLineIdx];
  const list=document.getElementById("towers-list");
  list.innerHTML="";
  line.towers.forEach((tower,tIdx)=>{
    const div=document.createElement("div");
    div.id="card-"+tIdx;
    div.className="card";
    list.appendChild(div);
    renderTowerCard(tower,tIdx);
  });
  updateBottomBar();
}

function saveSessions(){
  saveState();
  const btn=document.getElementById("btn-save");
  btn.textContent="✓ บันทึกแล้ว";
  btn.style.background="#1D9E75";
  btn.style.color="#fff";
  setTimeout(()=>{btn.textContent="💾 บันทึก";btn.style.background="#fff5cc";btn.style.color="#7a5800";},2000);
}

function showSummary(){
  prevScreen=document.querySelector(".screen.active").id.replace("screen-","");
  const content=document.getElementById("summary-content");
  content.innerHTML="";
  let hasData=false;
  Object.entries(state.sessions).forEach(([key,s])=>{
    const rows=Object.entries(s.towers||{}).filter(([,d])=>d&&((d.pole||[]).length||(d.span||[]).length||d.poleOther||d.spanOther))
      .sort((a,b)=>(parseInt(a[0])||0)-(parseInt(b[0])||0));
    if(!rows.length) return;
    hasData=true;
    const block=document.createElement("div");
    block.style.marginBottom="16px";
    block.innerHTML=`<div style="font-weight:600;font-size:13px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee;">${s.line?.name}</div>`;
    rows.forEach(([tk,d])=>{
      const tower=tk.split(":").slice(1).join(":");
      const pi=[...(d.pole||[])].filter(x=>x!=="อื่นๆ");if(d.poleOther)pi.push(d.poleOther);
      const si=[...(d.span||[])].filter(x=>x!=="อื่นๆ");if(d.spanOther)si.push(d.spanOther);
      const parts=[];
      if(pi.length) parts.push(pi.join(", ")+(d.poleNote?` (${d.poleNote})`:""));
      if(si.length) parts.push(si.join(", ")+(d.spanNote?` (${d.spanNote})`:""));
      const row=document.createElement("div");
      row.style.cssText="display:flex;gap:10px;padding:5px 0;font-size:13px;border-bottom:1px solid #f0f0f0;";
      row.innerHTML=`<span style="font-weight:600;min-width:50px;">${tower}</span><span style="color:#555;">${parts.join(" / ")}</span>`;
      block.appendChild(row);
    });
    content.appendChild(block);
  });
  document.getElementById("no-data").style.display=hasData?"none":"";
  showScreen("summary");
}

function backFromSummary(){
  showScreen(prevScreen);
}

function exportCSV(){
  const today=new Date();
  const d=`${String(today.getDate()).padStart(2,"0")}/${String(today.getMonth()+1).padStart(2,"0")}/${today.getFullYear()+543}`;
  const rows=[["No.","Line","Tower No.","TMU.","วันที่พบ","Description"]];
  let no=1;
  Object.entries(state.sessions).forEach(([,lineData])=>{
    const {line,towers}=lineData;
    const sorted=Object.entries(towers).sort((a,b)=>(parseInt(a[0])||0)-(parseInt(b[0])||0));
    sorted.forEach(([tk,d2])=>{
      if(!d2) return;
      const parts2=tk.split(":");
      const tIdx=parseInt(parts2[0]);
      const tower=parts2.slice(1).join(":");
      const parts=[];
      const pi=[...(d2.pole||[])];if(d2.poleOther)pi.push(d2.poleOther);
      const poleStr=pi.filter(x=>x!=="อื่นๆ").join(", ");
      if(poleStr) parts.push(poleStr+(d2.poleNote?` (${d2.poleNote})`:""));
      const si=[...(d2.span||[])];if(d2.spanOther)si.push(d2.spanOther);
      const spanItems=si.filter(x=>x!=="อื่นๆ");
      if(spanItems.length){
        const nextT=tIdx>=0&&tIdx<line.towers.length-1?line.towers[tIdx+1]:"";
        const prefix=nextT?`T.${tower} - ${nextT} `:"";
        const spanStr=[prefix+spanItems[0],...spanItems.slice(1)].join(", ");
        parts.push(spanStr+(d2.spanNote?` (${d2.spanNote})`:""));
      }
      if(!parts.length) return;
      let lineName2=line.name;
      if(line.lc&&line.lc.length>0){
        let cur=line.name;
        for(let i=0;i<line.lc.length;i++){if(line.lc[i][0]<=tIdx)cur=line.lc[i][1];else break;}
        lineName2=cur;
      }
      rows.push([no++,lineName2,`'${tower}`,line.tmu||"",d,parts.join(" / ")]);
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`inspection_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,"0")}${String(today.getDate()).padStart(2,"0")}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Init
showZone();
// Push initial state for Android back button
history.replaceState({screen:"zone"}, "", "");
</script>
